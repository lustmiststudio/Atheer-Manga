           1. نظام الثوابت والجذر (CSS VARIABLES)

           =========================================
        */
        :root {
            --main-bg: #020202;
            --surface-deep: #080808;
            --surface-card: #0f0f0f;
            --surface-hover: #161616;
            --accent-primary: #00d4ff;

           2. التنسيقات الأساسية (GLOBAL RESET)
           تحسين الأداء وإلغاء الهوامش الافتراضية
           =========================================

            margin: 0;

            -webkit-tap-highlight-color: transparent;

        /* =========================================

        @media (max-width: 768px) {

    <script>
        /* =========================================
           11. منطق التحكم البرمجي (CORE ENGINE)
           تحليل الحالة، طلب البيانات، وإدارة الواجهة
           =========================================
        */

        const APP_STATE = {
            API_BASE: 'https://api.mangadex.org',
            LIMIT: 24,
            OFFSET: 0,
            SORT_MODE: 'followedCount',
            GENRE_ID: '',
            QUERY: '',
            BUSY: false,
            END_OF_DATA: false,
            SELECTED_ID: '',
            SELECTED_TITLE: '',
            CHAPTER_MAP: [],
            CURRENT_IDX: -1,
            AD_SHOWN_LAST: Date.now()
        };

        /**
         * وظائف إدارة الإعلانات (Ad Manager)
         * تتحكم في متى وكيف تظهر الإعلانات لزيادة الأرباح
         */
        const AdManager = {
            init: function() {
                console.log("Ad Manager Active v1.0");
                // هنا يمكن إضافة أكواد تهيئة الشركات الإعلانية
            },
            showInterstitial: function() {
                const el = document.getElementById('ad-reader-interstitial');
                if(el) el.style.display = 'block';
            },
            hideInterstitial: function() {
                const el = document.getElementById('ad-reader-interstitial');
                if(el) el.style.display = 'none';
            },
            trackImpression: function(zone) {
                console.log("Impression logged for: " + zone);
            }
        };

        /**
         * تهيئة النظام عند تحميل النافذة
         */
        window.addEventListener('load', async () => {
            checkReadingHistory();
            AdManager.init();
            
            try {
                // تحميل نظام العضوية
                await Clerk.load();
                if (Clerk.user) {
                    document.getElementById('login-proxy-btn').style.display = 'none';
                    Clerk.mountUserButton(document.getElementById('clerk-user-button'));
                } else {
                    document.getElementById('login-proxy-btn').onclick = () => Clerk.openSignIn();
                }
                engineInit();
            } catch (err) { 
                console.warn("Clerk failed to load, starting in guest mode.");
                engineInit(); 
            }
        });

        async function engineInit() {
            await loadGenres();
            await fetchContent(true);
            bindEvents();
            
            // شاشة البوت لوادر
            setTimeout(() => {
                const bs = document.getElementById('boot-screen');
                bs.style.opacity = '0';
                bs.style.transition = '0.8s';
                setTimeout(() => bs.style.display = 'none', 800);
            }, 1800);
        }

        /* -----------------------------------------
           إدارة سجل القراءة (History Management)
           -----------------------------------------
        */

        function saveProgress(mangaId, mangaTitle, chapterIdx, chapterLabel) {
            const data = { mangaId, mangaTitle, chapterIdx, chapterLabel };
            localStorage.setItem('atheer_last_read', JSON.stringify(data));
            checkReadingHistory();
        }

        function checkReadingHistory() {
            const saved = localStorage.getItem('atheer_last_read');
            const widget = document.getElementById('last-read-widget');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('hist-manga-name').innerText = data.mangaTitle;
                document.getElementById('hist-chapter-num').innerText = `استكمال الفصل ${data.chapterLabel}`;
                widget.style.display = 'block';
            }
        }

        async function resumeReading() {
            const saved = JSON.parse(localStorage.getItem('atheer_last_read'));
            sidebarToggle(false);
            // فتح قائمة فصول المانجا المحفوظة بصمت لضمان جلب الـ ChapterMap
            await openChapters(saved.mangaId, saved.mangaTitle, true);
            // تشغيل الفصل المحفوظ من الفهرس المأخوذ من السجل
            readerStart(saved.chapterIdx);
        }

        /* -----------------------------------------
           محرك جلب البيانات من MangaDex
           -----------------------------------------
        */

        async function fetchContent(reset = false) {
            if (APP_STATE.BUSY) return;
            if (reset) {
                APP_STATE.OFFSET = 0;
                APP_STATE.END_OF_DATA = false;
                document.getElementById('manga-render-grid').innerHTML = '';
            }

            APP_STATE.BUSY = true;
            document.getElementById('infinite-scroll-trigger').style.display = 'block';

            let endpoint = `${APP_STATE.API_BASE}/manga?limit=${APP_STATE.LIMIT}&offset=${APP_STATE.OFFSET}&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive`;
            
            // إضافة الفلاتر
            if (APP_STATE.QUERY) endpoint += `&title=${encodeURIComponent(APP_STATE.QUERY)}`;
            if (APP_STATE.GENRE_ID) endpoint += `&includedTags[]=${APP_STATE.GENRE_ID}`;
            
            // فرز النتائج
            endpoint += `&order[${APP_STATE.SORT_MODE}]=desc`;

            try {
                const response = await fetch(endpoint);
                const result = await response.json();
                const items = result.data;
                
                if (items.length < APP_STATE.LIMIT) {
                    APP_STATE.END_OF_DATA = true;
                }
                
                items.forEach(m => renderMangaCard(m));
                APP_STATE.OFFSET += APP_STATE.LIMIT;
                
                AdManager.trackImpression("MainGrid");
            } catch (error) {
                console.error("Critical Fetch Error:", error);
            } finally {
                APP_STATE.BUSY = false;
                document.getElementById('infinite-scroll-trigger').style.display = 'none';
            }
        }

        function renderMangaCard(m) {
            const container = document.getElementById('manga-render-grid');
            const attr = m.attributes;
            const title = attr.title.en || attr.title.ja || Object.values(attr.title)[0] || "No Title";
            
            const coverRel = m.relationships.find(r => r.type === 'cover_art');
            const file = coverRel ? coverRel.attributes.fileName : '';
            const finalImg = file ? `https://uploads.mangadex.org/covers/${m.id}/${file}.256.jpg` : 'https://via.placeholder.com/256x384/111/444';
            
            // محاكاة تقييم عشوائي لاحترافية العرض
            const rating = (Math.random() * (9.8 - 7.5) + 7.5).toFixed(1);

            const card = document.createElement('div');
            card.className = 'manga-entry';
            card.innerHTML = `
                <div class="manga-thumb">
                    <div class="badge-rating">⭐ ${rating}</div>
                    <img src="${finalImg}" alt="${title}" loading="lazy">
                </div>
                <div class="manga-info-panel">
                    <div class="manga-name-text">${title}</div>
                    <div class="manga-meta-tag">MangaDex Source</div>
                </div>
            `;
            card.onclick = () => openChapters(m.id, title);
            container.appendChild(card);
        }

        async function openChapters(id, title, isSilent = false) {
            APP_STATE.SELECTED_ID = id;
            APP_STATE.SELECTED_TITLE = title;
            
            const modal = document.getElementById('chapter-modal');
            const list = document.getElementById('chapter-list-target');
            document.getElementById('modal-manga-title').innerText = title;
            
            if (!isSilent) {
                modal.style.display = 'flex';
                list.innerHTML = '<div style="padding:50px; text-align:center; opacity:0.5;">جاري الاستجابة...</div>';
            }

            try {
                const res = await fetch(`${APP_STATE.API_BASE}/manga/${id}/feed?translatedLanguage[]=ar&translatedLanguage[]=en&order[chapter]=desc&limit=100`);
                const data = await res.json();
                APP_STATE.CHAPTER_MAP = data.data;

                if (APP_STATE.CHAPTER_MAP.length === 0 && !isSilent) {
                    list.innerHTML = '<p style="text-align:center; padding:30px;">لا يوجد فصول عربية/إنجليزية حالياً.</p>';
                    return;
                }

                if (!isSilent) {
                    list.innerHTML = APP_STATE.CHAPTER_MAP.map((ch, idx) => `
                        <div class="chapter-item" onclick="readerStart(${idx})">
                            <span>الفصل ${ch.attributes.chapter || '0'}</span>
                            <span style="color:var(--accent-primary); font-size:0.75rem">${ch.attributes.translatedLanguage.toUpperCase()}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                if (!isSilent) list.innerHTML = '<p style="color:red; text-align:center;">فشل الاتصال بالخادم.</p>';
            }
        }

        /* -----------------------------------------
           محرك القراءة المتقدم (Reader Engine)
           -----------------------------------------
        */

        async function readerStart(idx) {
            APP_STATE.CURRENT_IDX = idx;
            const chapter = APP_STATE.CHAPTER_MAP[idx];
            const reader = document.getElementById('atheer-reader');
            const canvas = document.getElementById('reader-pages-flow');
            
            // حفظ التقدم عند بدء القراءة
            saveProgress(APP_STATE.SELECTED_ID, APP_STATE.SELECTED_TITLE, idx, chapter.attributes.chapter);

            // إغلاق أي نوافذ مفتوحة
            modalClose();
            
            // تهيئة واجهة القارئ
            reader.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('active-manga-name').innerText = APP_STATE.SELECTED_TITLE;
            document.getElementById('active-chapter-label').innerText = `فصل ${chapter.attributes.chapter}`;
            
            canvas.innerHTML = '<div style="padding:150px 0; text-align:center; letter-spacing:2px; font-weight:800;">BUFFERING PAGES...</div>';
            
            // تحديث أزرار التنقل
            readerNavUpdate();

            try {
                const res = await fetch(`${APP_STATE.API_BASE}/at-home/server/${chapter.id}`);
                const data = await res.json();
                const hash = data.chapter.hash;
                const pages = data.chapter.data;

                // حقن الصور مع تقنية Lazy Loading
                canvas.innerHTML = pages.map(p => `
                    <img src="${data.baseUrl}/data/${hash}/${p}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/800x1200?text=Reloading...'"
                         onload="this.style.opacity=1" style="opacity:0;">
                `).join('');
                
                // إضافة الإعلان في نهاية القائمة
                const adZone = document.getElementById('ad-reader-interstitial');
                canvas.appendChild(adZone);
                AdManager.showInterstitial();
                
                canvas.scrollTop = 0;
            } catch (err) {
                canvas.innerHTML = '<p style="color:red; text-align:center; padding:50px;">خطأ في تحميل الصور.</p>';
            }
        }

        function chChange(dir) {
            if (dir === 'next' && APP_STATE.CURRENT_IDX > 0) {
                readerStart(APP_STATE.CURRENT_IDX - 1);
            } else if (dir === 'prev' && APP_STATE.CURRENT_IDX < APP_STATE.CHAPTER_MAP.length - 1) {
                readerStart(APP_STATE.CURRENT_IDX + 1);
            }
        }

        function readerNavUpdate() {
            document.getElementById('next-ch-btn').disabled = (APP_STATE.CURRENT_IDX <= 0);
            document.getElementById('prev-ch-btn').disabled = (APP_STATE.CURRENT_IDX >= APP_STATE.CHAPTER_MAP.length - 1);
        }

        /* -----------------------------------------
           وظائف واجهة المستخدم والمساعدات (UI Helpers)
           -----------------------------------------
        */

        function sidebarToggle(open) {
            document.getElementById('main-nav').classList.toggle('active', open);
            const dimmer = document.getElementById('global-dimmer');
            dimmer.style.display = open ? 'block' : 'none';
            setTimeout(() => dimmer.style.opacity = open ? '1' : '0', 10);
        }

        function updateSort(mode, el) {
            APP_STATE.SORT_MODE = mode;
            updateActiveState(el);
            fetchContent(true);
            sidebarToggle(false);
        }

        function updateGenre(gid, el) {
            APP_STATE.GENRE_ID = gid;
            updateActiveState(el);
            fetchContent(true);
            sidebarToggle(false);
        }

        function updateActiveState(el) {
            if(!el) return;
            el.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function modalClose() { 
            document.getElementById('chapter-modal').style.display = 'none'; 
        }
        
        function readerExit() { 
            document.getElementById('atheer-reader').style.display = 'none'; 
            document.body.style.overflow = 'auto';
            document.getElementById('reader-pages-flow').innerHTML = ''; 
            AdManager.hideInterstitial();
        }

        function readerOpenChapters() {
            const currentMangaId = APP_STATE.SELECTED_ID;
            const currentMangaTitle = APP_STATE.SELECTED_TITLE;
            readerExit();
            openChapters(currentMangaId, currentMangaTitle);
        }

        async function loadGenres() {
            try {
                const res = await fetch(`${APP_STATE.API_BASE}/manga/tag`);
                const json = await res.json();
                const container = document.getElementById('genre-container');
                
                // جلب أول 25 تصنيف فقط للحفاظ على نظافة القائمة
                json.data.slice(0, 25).forEach(tag => {
                    const btn = document.createElement('div');
                    btn.className = 'nav-btn';
                    btn.innerText = tag.attributes.name.en;
                    btn.onclick = () => updateGenre(tag.id, btn);
                    container.appendChild(btn);
                });
            } catch (e) { 
                console.error("Genre Load Error: Tags could not be retrieved."); 
            }
        }

        /**
         * ربط أحداث الإدخال والتمرير (Event Binding)
         */
        function bindEvents() {
            let debounceTimer;
            
            // محرك البحث مع ميزة Debounce لتقليل طلبات API
            const searchInput = document.getElementById('manga-search-input');
            if(searchInput) {
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        APP_STATE.QUERY = e.target.value.trim();
                        fetchContent(true);
                    }, 800);
                });
            }

            // نظام Infinite Scroll (التمرير اللانهائي)
            window.addEventListener('scroll', () => {
                const scrollPos = window.innerHeight + window.scrollY;
                const pageBottom = document.body.offsetHeight - 1200;
                
                if (scrollPos >= pageBottom) {
                    if (!APP_STATE.BUSY && !APP_STATE.END_OF_DATA) {
                        fetchContent();
                    }
                }
            });

            console.log("Events successfully bound to Atheer Engine.");
        }
    </script>
    
    </body>
</html>
